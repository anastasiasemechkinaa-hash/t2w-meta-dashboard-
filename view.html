<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ładowanie raportu...</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .loader { text-align: center; color: #555; }
  .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #F5A000; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #e53e3e; }
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div>Ładowanie raportu...</div>
</div>
<script>
const FB_URL = 'https://t2w-ads-dashboard-default-rtdb.europe-west1.firebasedatabase.app';
const id = new URLSearchParams(location.search).get('id');

if (!id) {
  document.getElementById('loader').innerHTML = '<div class="error">Brak ID raportu w URL.</div>';
} else {
  fetch(`${FB_URL}/reports/${id}.json`)
    .then(r => r.json())
    .then(html => {
      if (!html) throw new Error('Raport nie istnieje lub wygasł.');
      document.open();
      document.write(html);
      document.close();
    })
    .catch(e => {
      document.getElementById('loader').innerHTML = `<div class="error">Błąd: ${e.message}</div>`;
    });
}
</script>
</body>
</html>
